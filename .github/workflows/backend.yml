# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — Backend Wagtail (headless)
#
#    lint (ruff)  →  check (Django)  →  deploy (SSH → VPS Contabo)
#
#  Le déploiement = `git pull` + `docker compose up --build` sur le VPS
#  (cf. backend/deploy/deploy.sh + backend/docker-compose.prod.yml).
#  Frontend Next.js : hébergé sur Vercel (CI/déploiement gérés côté Vercel).
#
#  ── Secrets GitHub (Settings → Secrets and variables → Actions) ──
#    CONTABO_HOST       IP / hostname du VPS Contabo
#    CONTABO_USER       utilisateur SSH de déploiement (ex. deploy)
#    CONTABO_SSH_KEY    clé privée SSH de cet utilisateur (PEM, multi-lignes)
#    CONTABO_SSH_PORT   port SSH (optionnel, défaut 22)
#  ── Variable GitHub ──
#    DEPLOY_PATH        chemin du dépôt sur le serveur (ex. /home/deploy/fodecc-refonte)
# ─────────────────────────────────────────────────────────────────────────────
name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  workflow_dispatch: {}

concurrency:
  group: backend-${{ github.ref }}
  # On annule les runs en cours sur les branches/PR, mais jamais un déploiement sur main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv python install 3.12
      - run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
        continue-on-error: true # non-bloquant tant que le code n'est pas reformaté

  check:
    name: Django checks
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - run: uv python install 3.12
      - run: uv sync
      - name: manage.py check
        run: uv run python manage.py check
      - name: Migrations à jour ?
        run: uv run python manage.py makemigrations --check --dry-run

  deploy:
    name: Déploiement SSH → Contabo
    needs: [lint, check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Déployer via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          port: ${{ secrets.CONTABO_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd "${{ vars.DEPLOY_PATH }}"
            export DEPLOY_BRANCH=main
            bash backend/deploy/deploy.sh
