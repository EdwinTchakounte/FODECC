# ─────────────────────────────────────────────────────────────────────────────
#  FODECC — stack de DÉVELOPPEMENT LOCAL complète (docker compose)
#
#      docker compose up --build
#
#  Une fois démarré (la 1re fois prend ~1 min : uv sync + npm install) :
#    • CMS Wagtail   →  http://localhost:8000/cms/        (login : admin / admin)
#    • Swagger / API →  http://localhost:8000/api/docs/   (et /api/v2/pages/)
#    • Vitrine Next  →  http://localhost:3000/fr
#
#  Le backend applique migrations + bootstrap + contenu de démo + super-utilisateur
#  de dev automatiquement au démarrage. Pour importer les 136 articles de l'ancien site :
#      docker compose exec backend uv run python /app/scripts/migrate_content.py --source /audit --apply
#
#  (Pour la PRODUCTION sur le VPS Contabo, voir backend/docker-compose.prod.yml.)
# ─────────────────────────────────────────────────────────────────────────────
name: fodecc-dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fodecc
      POSTGRES_USER: fodecc
      POSTGRES_PASSWORD: fodecc
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fodecc -d fodecc"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DJANGO_SECRET_KEY: dev-only-secret-not-for-production
      DATABASE_URL: postgres://fodecc:fodecc@db:5432/fodecc
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      HEADLESS_PREVIEW_CLIENT_URL: http://localhost:3000
      PREVIEW_SECRET: dev-preview-secret
      REVALIDATE_SECRET: dev-preview-secret
      NEXT_REVALIDATE_URL: http://frontend:3000/api/revalidate
      DEV_SUPERUSER_USER: admin
      DEV_SUPERUSER_PASSWORD: admin
      UV_LINK_MODE: copy
      UV_PYTHON_DOWNLOADS: never
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts:ro             # scripts de migration de contenu
      - venv:/app/.venv          # venv propre au conteneur (ne touche pas ./backend/.venv de l'hôte)
      - media:/app/media
      - ../01-audit-site-existant:/audit:ro   # ancien site (pour migrate_content.py) — adapter le chemin si besoin
    ports:
      - "8000:8000"
    command:
      - sh
      - -c
      - |
        set -e
        uv sync --no-dev
        uv run python manage.py migrate --noinput
        uv run python manage.py collectstatic --noinput
        uv run python manage.py bootstrap_site --hostname localhost --port 8000
        uv run python manage.py bootstrap_demo
        uv run python manage.py create_dev_superuser
        echo "──────────────────────────────────────────────────────────"
        echo "  CMS      : http://localhost:8000/cms/   (admin / admin)"
        echo "  Swagger  : http://localhost:8000/api/docs/"
        echo "  Vitrine  : http://localhost:3000/fr"
        echo "──────────────────────────────────────────────────────────"
        exec uv run python manage.py runserver 0.0.0.0:8000

  frontend:
    image: node:22-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Côté serveur Next (RSC/SSG) : on parle au backend via le réseau docker.
      WAGTAIL_API_URL: http://backend:8000
      # Côté navigateur : doit pointer vers l'hôte.
      NEXT_PUBLIC_WAGTAIL_API_URL: http://localhost:8000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      REVALIDATE_SECRET: dev-preview-secret
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"   # fiabilise le hot-reload à travers le volume monté
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "3000:3000"
    command:
      - sh
      - -c
      - |
        set -e
        [ -d node_modules/next ] || npm install --no-audit --no-fund
        exec npm run dev

volumes:
  pgdata:
  venv:
  media:
  node_modules:
  next_cache:
