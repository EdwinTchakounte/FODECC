# ─────────────────────────────────────────────────────────────────────
# Reverse proxy Nginx — backend FODECC (Wagtail headless)
# Domaine : backend.fodecc-vitrine.horus-lab.com
#   ⚠ Si vous changez ce nom, il apparaît aussi dans :
#     - deploy/init-letsencrypt.sh (variable DOMAIN par défaut)
#     - .env de prod : DJANGO_ALLOWED_HOSTS, WAGTAIL_BASE_URL, CERTBOT_DOMAIN
#
#   Internet ──HTTPS──> Nginx (443) ──HTTP──> Django/Wagtail gunicorn (8000)
#                       ├── /static/  → /app/staticfiles  (assets admin Wagtail)
#                       ├── /media/   → /app/media        (uploads)
#                       ├── /.well-known/acme-challenge/ → certbot
#                       └── /         → web:8000 (admin /cms/, API /api/v2/, /documents/…)
#
# Note : SECURE_PROXY_SSL_HEADER ("HTTP_X_FORWARDED_PROTO", "https") est déjà
# défini dans config/settings/prod.py — Django sait qu'il est derrière un proxy.
# ─────────────────────────────────────────────────────────────────────

# HTTP : challenge ACME + redirect vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name backend.fodecc-vitrine.horus-lab.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS : reverse proxy vers Wagtail
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name backend.fodecc-vitrine.horus-lab.com;

    ssl_certificate     /etc/letsencrypt/live/backend.fodecc-vitrine.horus-lab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.fodecc-vitrine.horus-lab.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 64M;

    gzip on;
    gzip_types text/css text/javascript application/javascript application/json
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # ─── Statics (admin Wagtail / Django) ─────────────────────────────
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Médias uploadés ──────────────────────────────────────────────
    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    # ─── Health check (silencieux dans les logs) ──────────────────────
    location = /healthz/ {
        proxy_pass http://web:8000/healthz/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ─── Tout le reste : Wagtail (admin /cms/, API /api/v2/, /documents/, /sitemap.xml…) ─
    location / {
        proxy_pass http://web:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
